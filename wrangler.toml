name = "driver-manager-db"
main = "worker.js"
compatibility_date = "2026-02-13"

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB" # El nombre que usas en el worker: env.DB
database_name = "driver-manager-db"
database_id = "12874e42-670a-49ef-ae13-5d12229b21a3"

[[r2_buckets]]
binding = "INCIDENTS_BUCKET"
bucket_name = "driver-manager-incidents"

[[r2_buckets]]
binding = "DRIVERS_BUCKET"
bucket_name = "driver-storage"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "396a1fbc4053489091dcebc2325a5e16"
preview_id = "15ab9a11d7434708b0f43800a3470546"

[[kv_namespaces]]
binding = "WEB_SESSION_KV"
id = "d382844605fe4c33892da3446046790b"
preview_id = "6fbf2ae9b08a4fd0b17d7c26b1ab9ddc"

[[kv_namespaces]]
binding = "PUBLIC_TRACKING_KV"
id = "76b918008e1e4abfa004e285f367b634"
preview_id = "0649959eb2a04efc899bb4512c9a71cc"

[[durable_objects.bindings]]
name = "REALTIME_EVENTS"
class_name = "RealtimeEventsBroker"

[[migrations]]
tag = "realtime-events-v1"
new_sqlite_classes = ["RealtimeEventsBroker"]

[triggers]
crons = ["0 * * * *"]

# Set GOOGLE_MAPS_API_KEY in Cloudflare dashboard or local `.dev.vars`, not in git-tracked files.
