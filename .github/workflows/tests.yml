name: Python Tests

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: python -m unittest discover -s tests -v

  web-worker-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Worker Dependencies
        run: npm ci

      - name: Run Web + Worker Tests
        run: npm run test:web

  api-quality-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Worker Dependencies
        run: npm ci

      - name: Run API Quality Tests
        run: npm run test:api-quality

  remote-smoke-tests:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    env:
      REMOTE_SMOKE_BASE_URL: ${{ secrets.REMOTE_SMOKE_BASE_URL }}
      REMOTE_SMOKE_API_TOKEN: ${{ secrets.REMOTE_SMOKE_API_TOKEN }}
      REMOTE_SMOKE_API_SECRET: ${{ secrets.REMOTE_SMOKE_API_SECRET }}
      REMOTE_SMOKE_WEB_USERNAME: ${{ secrets.REMOTE_SMOKE_WEB_USERNAME }}
      REMOTE_SMOKE_WEB_PASSWORD: ${{ secrets.REMOTE_SMOKE_WEB_PASSWORD }}
    steps:
      - name: Skip remote smoke (missing REMOTE_SMOKE_BASE_URL)
        if: ${{ env.REMOTE_SMOKE_BASE_URL == '' }}
        run: echo "Skipping remote smoke tests because REMOTE_SMOKE_BASE_URL is not configured."

      - name: Checkout
        if: ${{ env.REMOTE_SMOKE_BASE_URL != '' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ env.REMOTE_SMOKE_BASE_URL != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Worker Dependencies
        if: ${{ env.REMOTE_SMOKE_BASE_URL != '' }}
        run: npm ci

      - name: Run Remote Smoke Tests
        if: ${{ env.REMOTE_SMOKE_BASE_URL != '' }}
        run: npm run test:smoke:remote

  mobile-app-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install Mobile Dependencies
        run: npm ci

      - name: Run Mobile Unit Tests
        run: npm test
